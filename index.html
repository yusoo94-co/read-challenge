// ══════════════════════════════════════════
//  데이터 함수
// ══════════════════════════════════════════
async function dbLoad() {
  try {
    const snap = await get(ref(db, "rooms"));
    return snap.exists() ? { rooms: snap.val() } : { rooms: {} };
  } catch(e) {
    const l = localStorage.getItem("rc_db");
    return l ? JSON.parse(l) : { rooms: {} };
  }
}

async function dbSave(data) {
  try { await set(ref(db, "rooms"), data.rooms); } catch {}
  try { localStorage.setItem("rc_db", JSON.stringify(data)); } catch {}
}

function subscribeRoom(roomId, cb) {
  try {
    return onValue(ref(db, `rooms/${roomId}`), snap => {
      if (snap.exists()) cb(snap.val());
    });
  } catch { return () => {}; }
}

// ══════════════════════════════════════════
//  헬퍼
// ══════════════════════════════════════════
const genId = () => Math.random().toString(36).slice(2,10);
const genCode = () => Math.random().toString(36).slice(2,8).toUpperCase();
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDt = iso => { const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`; };

// ══════════════════════════════════════════
//  상태
// ══════════════════════════════════════════
let state = {
  screen: "splash", // splash|landing|createRoom|joinRoom|setup|home|rank|history|admin
  room: null, roomId: null, myId: null,
  activeNav: "home", loading: false,
  editTarget: null, unsub: null,
  fName:"", fCell:"", fAvatar:null,
  fChurch:"", fChallenge:"", fGoal:"500", fCode:""
};

// ══════════════════════════════════════════
//  렌더 엔진
// ══════════════════════════════════════════
function render() {
  const root = document.getElementById("root");
  if (!root) return;
  root.innerHTML = buildScreen();
  attachEvents();
}

function buildScreen() {
  const s = state;
  const me = s.room?.members?.[s.myId];
  const isAdmin = me?.isAdmin;

  switch(s.screen) {
    case "splash": return buildSplash();
    case "landing": return buildLanding();
    case "createRoom": return buildCreateRoom();
    case "joinRoom": return buildJoinRoom();
    case "setup": return buildSetup();
    case "home": return me ? buildMain(me, isAdmin) : buildLanding();
    case "rank": return me ? buildMain(me, isAdmin) : buildLanding();
    case "history": return me ? buildMain(me, isAdmin) : buildLanding();
    case "admin": return me && isAdmin ? buildMain(me, isAdmin) : buildLanding();
    default: return buildLanding();
  }
}

function buildMain(me, isAdmin) {
  const r = state.room;
  const members = Object.values(r?.members||{}).sort((a,b)=>(b.reads?.length||0)-(a.reads?.length||0));
  const myReads = me?.reads||[];
  const goal = r?.goal||500;
  const totalReads = members.reduce((s,m)=>s+(m.reads?.length||0),0);
  const myRank = members.findIndex(m=>m.id===state.myId)+1;
  const todayCount = myReads.filter(x=>x.slice(0,10)===todayStr()).length;

  const navItems = [
    {id:"home",icon:"🏠",label:"홈"},
    {id:"rank",icon:"🏆",label:"랭킹"},
    {id:"history",icon:"📋",label:"기록"},
    ...(isAdmin?[{id:"admin",icon:"⚙️",label:"관리"}]:[])
  ];

  return `
  <div class="main-wrap">
    <div class="main-header">
      <div style="font-size:10px;color:#7A8299;letter-spacing:2px;text-transform:uppercase">${esc(r?.church||"")}</div>
      <div style="font-family:'Noto Serif KR',serif;font-size:18px;font-weight:900;color:#C9A84C">${esc(r?.challenge||"")}</div>
    </div>
    <div class="main-content">
      ${state.screen==="home"?buildHome(me,myReads,goal,myRank,todayCount):""}
      ${state.screen==="rank"?buildRank(members,totalReads,goal):""}
      ${state.screen==="history"?buildHistory(myReads):""}
      ${state.screen==="admin"&&isAdmin?buildAdmin(members,r):""}
    </div>
    <nav class="nav">
      ${navItems.map(n=>`
        <button class="nav-btn ${state.activeNav===n.id?"active":""}" data-nav="${n.id}">
          <span style="font-size:20px">${n.icon}</span>${n.label}
        </button>`).join("")}
    </nav>
  </div>`;
}

function buildHome(me, myReads, goal, myRank, todayCount) {
  const pct = Math.min(myReads.length/goal,1);
  const circ = 395.84;
  const offset = circ - pct*circ;
  const recent = [...myReads].reverse().slice(0,8);
  const hm = buildHeatmap(myReads);
  return `
  <div class="banner">
    <div class="banner-avatar">${me.avatar?`<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:"🙏"}</div>
    <div style="flex:1">
      <div style="font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700">${esc(me.name)} 성도님</div>
      <div style="font-size:12px;color:#7A8299;margin-top:2px">${esc(me.cell)} · <span style="color:#C9A84C;font-weight:700">${myReads.length}독</span> · ${myRank}위</div>
    </div>
    ${todayCount>0?`<div class="today-badge">오늘 ${todayCount}독</div>`:""}
  </div>

  <div class="card" style="display:flex;flex-direction:column;align-items:center;padding:22px 16px">
    <div style="position:relative;margin-bottom:12px">
      <svg width="150" height="150" style="transform:rotate(-90deg)">
        <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8B6914"/><stop offset="50%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#F0D47A"/>
        </linearGradient></defs>
        <circle cx="75" cy="75" r="63" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="8"/>
        <circle cx="75" cy="75" r="63" fill="none" stroke="url(#gg)" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s ease"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-family:'Noto Serif KR',serif;font-size:36px;font-weight:900;color:#C9A84C;line-height:1">${myReads.length}</div>
        <div style="font-size:12px;color:#7A8299;margin-top:3px">독</div>
      </div>
    </div>
    <div style="font-size:12px;color:#7A8299;margin-bottom:8px">목표 ${goal}독 · ${(pct*100).toFixed(1)}% 달성</div>
    <div style="width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">
      <div style="height:100%;border-radius:3px;background:linear-gradient(90deg,#8B6914,#C9A84C);width:${Math.min(pct*100,100)}%;transition:width 1s ease"></div>
    </div>
  </div>

  <button class="btn-green" id="btn-record" ${state.loading?"disabled":""}>
    ${state.loading?"기록 중...":"📖 완독 기록하기"}
  </button>

  <div class="card">
    <div class="sec-title">📅 최근 완독 기록</div>
    ${recent.length===0
      ?`<div class="empty">아직 기록이 없어요<br/>첫 완독을 기록해 보세요! 📖</div>`
      :recent.map((iso,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:${i<recent.length-1?"1px solid rgba(255,255,255,.04)":"none"}">
          <div class="read-num">${myReads.length-i}</div>
          <div style="font-size:13px">${fmtDt(iso)}</div>
        </div>`).join("")}
  </div>

  <div class="card">
    <div class="sec-title">🗓 이번 달 활동</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
      ${["일","월","화","수","목","금","토"].map(d=>`<div style="text-align:center;font-size:9px;color:#7A8299">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${hm}</div>
  </div>`;
}

function buildHeatmap(reads) {
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth();
  const fd=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate();
  const map={};
  reads.forEach(iso=>{const d=new Date(iso);if(d.getFullYear()===y&&d.getMonth()===mo){map[d.getDate()]=(map[d.getDate()]||0)+1;}});
  let html="";
  for(let i=0;i<fd;i++) html+=`<div style="aspect-ratio:1"></div>`;
  for(let d=1;d<=days;d++){
    const cnt=map[d]||0;
    html+=`<div style="aspect-ratio:1;border-radius:5px;background:${cnt?"rgba(201,168,76,.25)":"rgba(255,255,255,.04)"};border:${cnt?"1px solid rgba(201,168,76,.4)":"none"};display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:9px;color:${cnt?"#C9A84C":"#3A4255"};font-weight:${cnt?700:400}">
      <span>${d}</span>${cnt>0?`<span style="font-size:8px">×${cnt}</span>`:""}
    </div>`;
  }
  return html;
}

function buildRank(members, totalReads, goal) {
  const maxCount = members[0]?.reads?.length||1;
  const medals=["🥇","🥈","🥉"];
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    ${[{n:totalReads,l:"전체 총독수"},{n:members.length,l:"참여 인원"},
       {n:members.length?Math.round(totalReads/members.length):0,l:"1인 평균"},
       {n:Math.min(Math.round(totalReads/goal*100),100)+"%",l:"교회 달성률"}].map(s=>`
      <div class="stat-box">
        <div class="stat-num">${s.n}</div>
        <div class="stat-label">${s.l}</div>
      </div>`).join("")}
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:12px;color:#7A8299">교회 전체 목표</div>
      <div style="font-size:12px;color:#C9A84C;font-family:'Noto Serif KR',serif">${totalReads} / ${goal}독</div>
    </div>
    <div style="height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden">
      <div style="height:100%;border-radius:4px;background:linear-gradient(90deg,#8B6914,#C9A84C,#F0D47A);width:${Math.min(totalReads/goal*100,100)}%;transition:width 1s ease"></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sec-title" style="margin:0">🏆 성도 랭킹</div>
      <button class="btn-sm" id="btn-refresh">🔄 새로고침</button>
    </div>
    ${members.length===0?`<div class="empty">아직 참여자가 없어요 🙏</div>`:
      members.map((u,i)=>{
        const cnt=u.reads?.length||0;
        const pct=maxCount>0?cnt/maxCount*100:0;
        const isMe=u.id===state.myId;
        const color=BAR_COLORS[i%BAR_COLORS.length];
        return `
        <div style="margin-bottom:15px;background:${isMe?"rgba(201,168,76,.06)":"transparent"};border-radius:10px;padding:${isMe?"8px 10px":"0"};border:${isMe?"1px solid rgba(201,168,76,.2)":"none"}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <div style="font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;width:22px;text-align:center;color:${i<3?["#FFD700","#C0C0C0","#CD7F32"][i]:"#7A8299"}">
              ${i<3?medals[i]:i+1}
            </div>
            <div style="width:32px;height:32px;border-radius:50%;background:#060A12;border:1.5px solid ${color}55;display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0">
              ${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:"🙏"}
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:${isMe?700:400}">${esc(u.name)}${isMe?`<span style="font-size:10px;color:#C9A84C;margin-left:5px">나</span>`:""}</div>
              <div style="font-size:11px;color:#7A8299">${esc(u.cell)}</div>
            </div>
            <div style="font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:${color};flex-shrink:0">${cnt}독</div>
          </div>
          <div style="margin-left:30px;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden">
            <div style="height:100%;border-radius:4px;background:${color};width:${pct}%;opacity:.85"></div>
          </div>
        </div>`;
      }).join("")}
  </div>`;
}

function buildHistory(myReads) {
  return `
  <div class="card">
    <div class="sec-title">📋 전체 완독 기록 (${myReads.length}독)</div>
    ${myReads.length===0?`<div class="empty">아직 기록이 없어요</div>`:
      [...myReads].reverse().map((iso,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <div class="read-num">${myReads.length-i}</div>
          <div>
            <div style="font-size:13px">${new Date(iso).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}</div>

          </div>
        </div>`).join("")}

}

        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:50%;background:#060A12;border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0">
            ${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:"🙏"}

        </div>

// ══════════════════════════════════════════
//  이벤트
// ══════════════════════════════════════════
function attachEvents() {
  on("btn-back", ()=>{ setState({screen:"landing"}); });
  on("btn-create", ()=>{ setState({screen:"createRoom"}); });
  on("btn-join", ()=>{ setState({screen:"joinRoom"}); });
  on("btn-create-room", createRoom);
  on("btn-join-room", joinRoom);
  on("btn-save-profile", saveProfile);
  on("btn-record", recordRead);
  on("btn-refresh", async()=>{ const d=await dbLoad(); if(state.room&&d.rooms[state.roomId]) setState({room:d.rooms[state.roomId]}); showToast("🔄 새로고침 완료!"); });
  on("btn-copy-code", ()=>{ navigator.clipboard?.writeText(state.room?.inviteCode||"").catch(()=>{}); showToast("코드가 복사됐어요!"); });
  on("btn-edit-profile", ()=>{ const me=state.room?.members?.[state.myId]; if(me){setState({fName:me.name,fCell:me.cell,fAvatar:me.avatar||null,screen:"setup"});} });
  on("btn-leave", ()=>{ if(confirm("방에서 나가시겠어요?")){ localStorage.removeItem("rc_roomId"); localStorage.removeItem("rc_myId"); location.reload(); } });

  // 아바타
  on("avatar-circle", ()=>{ document.getElementById("avatar-input")?.click(); });
  const avatarInput = document.getElementById("avatar-input");
  if(avatarInput) avatarInput.addEventListener("change", handleAvatar);

  // 소속 피커
  on("picker-toggle", ()=>{
    const dd=document.getElementById("picker-dropdown");
    if(dd) dd.style.display=dd.style.display==="none"?"block":"none";
  });
  document.querySelectorAll(".picker-opt").forEach(el=>{
    el.addEventListener("click", ()=>{
      setState({fCell:el.dataset.val});
      const dd=document.getElementById("picker-dropdown");
      if(dd) dd.style.display="none";
    });
  });

  // 네비
  document.querySelectorAll(".nav-btn").forEach(el=>{
    el.addEventListener("click", ()=>{ setState({screen:el.dataset.nav, activeNav:el.dataset.nav}); });
  });

  // 멤버 수정/삭제
  document.querySelectorAll("[data-edit]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id=el.dataset.edit;
      setState({editTarget:state.editTarget===id?null:id});
    });
  });
  document.querySelectorAll("[data-save]").forEach(el=>{
    el.addEventListener("click", ()=>{ adminSetReads(el.dataset.save); });
  });
  document.querySelectorAll("[data-del]").forEach(el=>{
    el.addEventListener("click", ()=>{ adminRemoveMember(el.dataset.del); });
  });

  // 입력 필드 동기화
  syncInput("f-church","fChurch"); syncInput("f-challenge","fChallenge");
  syncInput("f-goal","fGoal"); syncInput("f-code","fCode","upper");
  syncInput("f-name","fName");
}

function syncInput(id, key, mode) {
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener("input", ()=>{ state[key]=mode==="upper"?el.value.toUpperCase():el.value; });
}

function on(id, fn) {
  const el=document.getElementById(id);
  if(el) el.addEventListener("click", fn);
}

// ══════════════════════════════════════════
//  액션
// ══════════════════════════════════════════
async function createRoom() {
  if(!state.fChurch.trim()){ showToast("교회 이름을 입력해 주세요"); return; }
  if(!state.fChallenge.trim()){ showToast("챌린지 이름을 입력해 주세요"); return; }
  setState({loading:true});
  const id=genId(), adminId=genId();
  const newRoom={
    id, inviteCode:genCode(),
    church:state.fChurch.trim(), challenge:state.fChallenge.trim(),
    goal:parseInt(state.fGoal)||500,
    createdAt:new Date().toISOString(),
    members:{[adminId]:{id:adminId,name:"관리자",cell:"교역자",avatar:null,reads:[],isAdmin:true,createdAt:new Date().toISOString()}}
  };
  const data=await dbLoad();
  data.rooms[id]=newRoom;
  await dbSave(data);
  localStorage.setItem("rc_roomId",id); localStorage.setItem("rc_myId",adminId);
  subscribeToRoom(id);
  setState({loading:false,roomId:id,myId:adminId,room:newRoom,screen:"home",activeNav:"home"});
  showToast("🎉 챌린지 방이 만들어졌어요!");
}

async function joinRoom() {
  const code=state.fCode.trim().toUpperCase();
  if(!code){ showToast("초대 코드를 입력해 주세요"); return; }
  setState({loading:true});
  const data=await dbLoad();
  const found=Object.values(data.rooms||{}).find(r=>r.inviteCode===code);
  if(!found){ showToast("❌ 코드를 다시 확인해 주세요"); setState({loading:false}); return; }
  localStorage.setItem("rc_roomId",found.id);
  setState({loading:false,roomId:found.id,room:found,screen:"setup"});
}

async function saveProfile() {
  if(!state.fName.trim()){ showToast("이름을 입력해 주세요 😊"); return; }
  if(!state.fCell){ showToast("소속을 선택해 주세요"); return; }
  setState({loading:true});
  const mid=state.myId||genId();
  const rid=state.roomId;
  const existing=state.room?.members?.[mid];
  const member={id:mid,name:state.fName.trim(),cell:state.fCell,avatar:state.fAvatar||existing?.avatar||null,reads:existing?.reads||[],isAdmin:existing?.isAdmin||false,createdAt:existing?.createdAt||new Date().toISOString()};
  try { await set(ref(db,`rooms/${rid}/members/${mid}`),member); } catch {
    const data=await dbLoad(); if(data.rooms[rid]){data.rooms[rid].members=data.rooms[rid].members||{};data.rooms[rid].members[mid]=member;} await dbSave(data);
  }
  localStorage.setItem("rc_myId",mid);
  subscribeToRoom(rid);
  setState({loading:false,myId:mid,screen:"home",activeNav:"home"});
  showToast("프로필이 저장되었습니다 🙏");
}

async function recordRead() {
  if(!state.myId||!state.roomId) return;
  setState({loading:true});
  const newReads=[...(state.room?.members?.[state.myId]?.reads||[]),new Date().toISOString()];
  try { await set(ref(db,`rooms/${state.roomId}/members/${state.myId}/reads`),newReads); } catch {
    const data=await dbLoad(); if(data.rooms[state.roomId]?.members[state.myId]) data.rooms[state.roomId].members[state.myId].reads=newReads; await dbSave(data);
    const r={...state.room,members:{...state.room.members,[state.myId]:{...state.room.members[state.myId],reads:newReads}}};
    setState({room:r});
  }
  setState({loading:false});
  const count=newReads.length;
  if(MILESTONES.includes(count)) showCelebrate(count);
  else showToast(`📖 ${count}독 완료! 수고하셨습니다`);
}

async function adminSetReads(memberId) {
  const n=parseInt(document.getElementById(`editval-${memberId}`)?.value);
  if(isNaN(n)||n<0) return;
  const member=state.room?.members?.[memberId]; if(!member) return;
  let reads=[...(member.reads||[])];
  if(n>reads.length) for(let i=0;i<n-reads.length;i++) reads.push(new Date().toISOString());
  else reads=reads.slice(0,n);
  try { await set(ref(db,`rooms/${state.roomId}/members/${memberId}/reads`),reads); } catch {
    const data=await dbLoad(); if(data.rooms[state.roomId]?.members[memberId]) data.rooms[state.roomId].members[memberId].reads=reads; await dbSave(data);
    const r={...state.room,members:{...state.room.members,[memberId]:{...state.room.members[memberId],reads}}};
    setState({room:r,editTarget:null});
  }
  showToast(`✅ ${member.name}님 ${n}독으로 수정됨`);
  setState({editTarget:null});
}

async function adminRemoveMember(memberId) {
  if(!confirm("정말 이 멤버를 삭제할까요?")) return;
  try { await set(ref(db,`rooms/${state.roomId}/members/${memberId}`),null); } catch {
    const data=await dbLoad(); if(data.rooms[state.roomId]?.members) delete data.rooms[state.roomId].members[memberId]; await dbSave(data);
    const m={...state.room.members}; delete m[memberId];
    setState({room:{...state.room,members:m}});
  }
  showToast("삭제되었습니다");
}

function subscribeToRoom(rid) {
  if(state.unsub) state.unsub();
  const unsub=subscribeRoom(rid, roomData=>{ state.room=roomData; render(); });
  state.unsub=unsub;
}

function handleAvatar(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const MAX=200, ratio=Math.min(MAX/img.width,MAX/img.height);
      canvas.width=img.width*ratio; canvas.height=img.height*ratio;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      setState({fAvatar:canvas.toDataURL("image/jpeg",0.7)});
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
//  상태 관리
// ══════════════════════════════════════════
function setState(partial) {
  Object.assign(state, partial);
  render();
}

// ══════════════════════════════════════════
//  토스트 / 축하
// ══════════════════════════════════════════
function showToast(msg) {
  const existing=document.getElementById("toast");
  if(existing) existing.remove();
  const el=document.createElement("div");
  el.id="toast"; el.className="toast"; el.textContent=msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),300); },2800);
}

function showCelebrate(n) {
  const m=CELEBRATE_MSG[n]||{e:"🎉",t:`${n}독!`,s:"수고하셨습니다"};
  const existing=document.getElementById("celebrate");
  if(existing) existing.remove();
  const el=document.createElement("div");
  el.id="celebrate"; el.className="celebrate-overlay";
  el.innerHTML=`
    <div class="celebrate-box">
      <div style="font-size:56px;margin-bottom:12px">${m.e}</div>
      <div style="font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:#C9A84C;margin-bottom:6px">${m.t}</div>
      <div style="font-size:14px;color:#7A8299;margin-bottom:22px">${m.s}</div>
      <button class="btn-ghost" id="btn-close-celebrate">아멘 🙏</button>
    </div>`;
  document.body.appendChild(el);
  on("btn-close-celebrate",()=>el.remove());
}

function esc(s="") { return String(s).replace(/[<>&"]/g,c=>({">":"&gt;","<":"&lt;","&":"&amp;",'"':"&quot;"}[c])); }

// ══════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════
async function init() {
  const storedRoom=localStorage.getItem("rc_roomId");
  const storedMe=localStorage.getItem("rc_myId");
  const urlCode=new URLSearchParams(location.search).get("join");
  const data=await dbLoad();
  if(urlCode) {
    const found=Object.values(data.rooms||{}).find(r=>r.inviteCode===urlCode);
    if(found){
      localStorage.setItem("rc_roomId",found.id);
      state.roomId=found.id; state.room=found;
      if(storedMe&&found.members?.[storedMe]){
        state.myId=storedMe; state.screen="home"; state.activeNav="home";
        subscribeToRoom(found.id);
      } else { state.screen="setup"; }
      render(); return;
    }
  }
  if(storedRoom&&storedMe&&data.rooms?.[storedRoom]?.members?.[storedMe]){
    state.roomId=storedRoom; state.myId=storedMe;
    state.room=data.rooms[storedRoom];
    state.screen="home"; state.activeNav="home";
    subscribeToRoom(storedRoom);
  } else {
    state.screen="landing";
  }
  render();
}

setTimeout(init,1000);
</script>

.banner-avatar{width:52px;height:52px;border-radius:50%;background:#060A12;border:2px solid #C9A84C;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
.today-badge{background:rgba(76,175,138,.15);border:1px solid rgba(76,175,138,.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#4CAF8A}
.sec-title{font-family:'Noto Serif KR',serif;font-size:11px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin-bottom:11px}
.empty{text-align:center;color:#7A8299;font-size:13px;padding:14px 0;line-height:1.8}
.read-num{width:26px;height:26px;border-radius:50%;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);display:flex;align-items:center;justify-content:center;font-size:10px;color:#C9A84C;font-weight:700;flex-shrink:0}
.stat-box{background:#111827;border:1px solid rgba(201,168,76,.1);border-radius:12px;padding:13px;text-align:center}
.stat-num{font-family:'Noto Serif KR',serif;font-size:25px;font-weight:900;color:#C9A84C;line-height:1}
.stat-label{font-size:11px;color:#7A8299;margin-top:4px}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E2E24;border:1px solid rgba(76,175,138,.4);color:white;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:500;z-index:200;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.celebrate-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center}
.celebrate-box{background:#111827;border:2px solid #C9A84C;border-radius:24px;padding:30px 38px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-width:280px}

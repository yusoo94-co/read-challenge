// 이름+PIN -> 고유ID (항상 동일값 -> 핸드폰 바꿔도 기록 유지)
const makeUserId = (name, pin) => {
  const base = name.trim().replace(/\s/g,"");
  let h = 5381;
  for(let i=0;i<base.length;i++) h = ((h<<5)+h)+base.charCodeAt(i);
  return "u_" + Math.abs(h).toString(36) + "_" + pin;
};

async function dbLoad() {
  try { const s=await get(ref(db,"rooms")); return s.exists()?{rooms:s.val()}:{rooms:{}}; } catch {}
  try { const l=localStorage.getItem("rc_db"); return l?JSON.parse(l):{rooms:{}}; } catch {}
  return {rooms:{}};
}
async function dbSave(data) {
  try { await set(ref(db,"rooms"),data.rooms); } catch {}
  try { localStorage.setItem("rc_db",JSON.stringify(data)); } catch {}
}
function saveLocal(roomId,myId) {
  try{localStorage.setItem("rc_roomId",roomId);localStorage.setItem("rc_myId",myId);}catch{}
  try{sessionStorage.setItem("rc_roomId",roomId);sessionStorage.setItem("rc_myId",myId);}catch{}
  try{document.cookie=`rc_rid=${roomId};max-age=31536000;path=/`;document.cookie=`rc_mid=${myId};max-age=31536000;path=/`;}catch{}
}
function loadLocal() {
  for(const s of["localStorage","sessionStorage"]){
    try{const r=window[s].getItem("rc_roomId"),m=window[s].getItem("rc_myId");if(r&&m)return{roomId:r,myId:m};}catch{}
  }
  try{const r=document.cookie.match(/rc_rid=([^;]+)/),m=document.cookie.match(/rc_mid=([^;]+)/);if(r&&m)return{roomId:r[1],myId:m[1]};}catch{}
  return null;
}
function clearLocal(){
  ["localStorage","sessionStorage"].forEach(s=>{try{window[s].removeItem("rc_roomId");window[s].removeItem("rc_myId");}catch{}});
  try{document.cookie="rc_rid=;max-age=0;path=/";document.cookie="rc_mid=;max-age=0;path=/";}catch{}
}

let S={

  room:null,roomId:null,myId:null,

  fChurch:"",fChallenge:"",fGoal:"500",fCode:"",
};
function setState(p){Object.assign(S,p);render();}

function render(){
  const root=document.getElementById("root");
  if(!root)return;
  root.innerHTML=buildScreen();
  attachEvents();
}

function buildScreen(){
  const me=S.room?.members?.[S.myId];
  switch(S.screen){
    case "splash": return `<div class="splash"><div class="cross glow">✝</div><div class="splash-title">말씀 챌린지</div><div class="spinner"></div></div>`;
    case "landing": return buildLanding();
    case "createRoom": return buildCreateRoom();
    case "joinRoom": return buildJoinRoom();
    case "login": return buildLogin();
    case "register": return buildRegister();
    case "editProfile": return buildEditProfile();
    case "home":case "rank":case "history":case "admin":
      return me?buildMain(me):buildLanding();
    default: return buildLanding();
  }
}

function buildMain(me){
  const isAdmin=me?.isAdmin;
  const members=Object.values(S.room.members||{}).sort((a,b)=>(b.reads?.length||0)-(a.reads?.length||0));
  const myReads=me?.reads||[];
  const goal=S.room.goal||500;
  const totalReads=members.reduce((s,m)=>s+(m.reads?.length||0),0);
  const myRank=members.findIndex(m=>m.id===S.myId)+1;
  const todayCount=myReads.filter(x=>x.slice(0,10)===todayStr()).length;
  const navItems=[{id:"home",icon:"🏠",label:"홈"},{id:"rank",icon:"🏆",label:"랭킹"},{id:"history",icon:"📋",label:"기록"},...(isAdmin?[{id:"admin",icon:"⚙️",label:"관리"}]:[])];
  return`
  <div class="main-wrap">
    <div class="main-header">
      <div style="font-size:10px;color:#7A8299;letter-spacing:2px;text-transform:uppercase">${esc(S.room.church)}</div>
      <div style="font-family:'Noto Serif KR',serif;font-size:18px;font-weight:900;color:#C9A84C">${esc(S.room.challenge)}</div>
    </div>
    <div class="main-content">
      ${S.screen==="home"?buildHome(me,myReads,goal,myRank,todayCount):""}
      ${S.screen==="rank"?buildRank(members,totalReads):""}
      ${S.screen==="history"?buildHistory(myReads,members):""}
      ${S.screen==="admin"&&isAdmin?buildAdmin(members,S.room):""}
    </div>
    <nav class="nav">
      ${navItems.map(n=>`<button class="nav-btn${S.activeNav===n.id?" active":""}" data-nav="${n.id}"><span style="font-size:20px">${n.icon}</span>${n.label}</button>`).join("")}
    </nav>
  </div>`;}

function buildHome(me,myReads,goal,myRank,todayCount){
  const pct=Math.min(myReads.length/goal,1),circ=395.84,offset=circ-pct*circ;
  const recent=[...myReads].reverse().slice(0,8);
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const fd=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
  const hmap={};myReads.forEach(iso=>{const d=new Date(iso);if(d.getFullYear()===y&&d.getMonth()===mo){hmap[d.getDate()]=(hmap[d.getDate()]||0)+1;}});
  let hm="";
  for(let i=0;i<fd;i++)hm+=`<div style="aspect-ratio:1"></div>`;
  for(let d=1;d<=days;d++){const cnt=hmap[d]||0;hm+=`<div style="aspect-ratio:1;border-radius:5px;background:${cnt?"rgba(201,168,76,.25)":"rgba(255,255,255,.04)"};border:${cnt?"1px solid rgba(201,168,76,.4)":"none"};display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:9px;color:${cnt?"#C9A84C":"#3A4255"};font-weight:${cnt?700:400}"><span>${d}</span>${cnt>0?`<span style="font-size:8px">×${cnt}</span>`:""}</div>`;}
  return`
  <div class="banner" id="btn-go-edit">
    <div class="banner-avatar">${me.avatar?`<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:"🙏"}</div>
    <div style="flex:1">
      <div style="font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700">${esc(me.name)} 성도님</div>
      <div style="font-size:12px;color:#7A8299;margin-top:2px">${esc(me.cell)} · <span style="color:#C9A84C;font-weight:700">${myReads.length}독</span> · ${myRank}위</div>
    </div>
    ${todayCount>0?`<div class="today-badge">오늘 ${todayCount}독</div>`:`<div style="font-size:11px;color:#7A8299">✏️ 수정</div>`}
  </div>
  <div class="card" style="display:flex;flex-direction:column;align-items:center;padding:22px 16px">
    <div style="position:relative;margin-bottom:12px">
      <svg width="150" height="150" style="transform:rotate(-90deg)">
        <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#8B6914"/><stop offset="50%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#F0D47A"/></linearGradient></defs>
        <circle cx="75" cy="75" r="63" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="8"/>
        <circle cx="75" cy="75" r="63" fill="none" stroke="url(#gg)" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s ease"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-family:'Noto Serif KR',serif;font-size:36px;font-weight:900;color:#C9A84C;line-height:1">${myReads.length}</div>
        <div style="font-size:12px;color:#7A8299;margin-top:3px">독</div>
      </div>
    </div>
    <div style="font-size:12px;color:#7A8299;margin-bottom:8px">목표 ${goal}독 · ${(pct*100).toFixed(1)}% 달성</div>
    <div style="width:100%;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">
      <div style="height:100%;border-radius:3px;background:linear-gradient(90deg,#8B6914,#C9A84C);width:${Math.min(pct*100,100)}%;transition:width 1s ease"></div>
    </div>
  </div>
  <button class="btn-green" id="btn-record" ${S.loading?"disabled":""}>${S.loading?"기록 중...":"📖 완독 기록하기"}</button>
  <div class="card">
    <div class="sec-title">📅 최근 완독 기록</div>
    ${recent.length===0?`<div class="empty">아직 기록이 없어요<br/>첫 완독을 기록해 보세요! 📖</div>`:
      recent.map((iso,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:${i<recent.length-1?"1px solid rgba(255,255,255,.04)":"none"}">
          <div class="read-num">${myReads.length-i}</div>
          <div style="font-size:13px">${fmtDt(iso)}</div>
        </div>`).join("")}
  </div>
  <div class="card">
    <div class="sec-title">🗓 이번 달 활동</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
      ${["일","월","화","수","목","금","토"].map(d=>`<div style="text-align:center;font-size:9px;color:#7A8299">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${hm}</div>
  </div>`;}

function buildRank(members,totalReads){
  const maxCount=members[0]?.reads?.length||1;
  const medals=["🥇","🥈","🥉"];
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    ${[{n:totalReads,l:"전체 총독수"},{n:members.length,l:"참여 인원"},{n:members.length?Math.round(totalReads/members.length):0,l:"1인 평균"}].map(s=>`
      <div class="stat-box"><div class="stat-num">${s.n}</div><div class="stat-label">${s.l}</div></div>`).join("")}
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sec-title" style="margin:0">🏆 성도 랭킹</div>
      <button class="btn-sm" id="btn-refresh">🔄 새로고침</button>
    </div>
    ${members.length===0?`<div class="empty">아직 참여자가 없어요 🙏</div>`:
      members.map((u,i)=>{
        const cnt=u.reads?.length||0,pct=maxCount>0?cnt/maxCount*100:0;
        const isMe=u.id===S.myId,color=BAR_COLORS[i%BAR_COLORS.length];
        return`
        <div style="margin-bottom:15px;background:${isMe?"rgba(201,168,76,.06)":"transparent"};border-radius:10px;padding:${isMe?"8px 10px":"0"};border:${isMe?"1px solid rgba(201,168,76,.2)":"none"}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
            <div style="font-family:'Noto Serif KR',serif;font-size:13px;font-weight:700;width:22px;text-align:center;color:${i<3?["#FFD700","#C0C0C0","#CD7F32"][i]:"#7A8299"}">${i<3?medals[i]:i+1}</div>
            <div style="width:32px;height:32px;border-radius:50%;background:#060A12;border:1.5px solid ${color}55;display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0">
              ${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:"🙏"}
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:${isMe?700:400}">${esc(u.name)}${isMe?`<span style="font-size:10px;color:#C9A84C;margin-left:5px">나</span>`:""}</div>
              <div style="font-size:11px;color:#7A8299">${esc(u.cell)}</div>
            </div>
            <div style="font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:${color};flex-shrink:0">${cnt}독</div>
          </div>
          <div style="margin-left:30px;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden">
            <div style="height:100%;border-radius:4px;background:${color};width:${pct}%;opacity:.85"></div>
          </div>
        </div>`;}
      ).join("")}
  </div>`;}

function buildHistory(myReads,members){
  const allRecords=[];
  members.forEach(u=>{
    (u.reads||[]).forEach(iso=>{
      allRecords.push({name:u.name,cell:u.cell,avatar:u.avatar,iso,isMe:u.id===S.myId});
    });
  });
  allRecords.sort((a,b)=>new Date(b.iso)-new Date(a.iso));
  return`
  <div class="tab-bar">
    <button class="tab-btn${S.historyTab==="my"?" active":""}" id="tab-my">내 기록 (${myReads.length}독)</button>
    <button class="tab-btn${S.historyTab==="all"?" active":""}" id="tab-all">전체 기록 (${allRecords.length}독)</button>
  </div>
  ${S.historyTab==="my"?`
  <div class="card">
    <div class="sec-title">📋 내 완독 기록</div>
    ${myReads.length===0?`<div class="empty">아직 기록이 없어요</div>`:
      [...myReads].reverse().map((iso,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <div class="read-num">${myReads.length-i}</div>
          <div>
            <div style="font-size:13px">${new Date(iso).toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}</div>
            <div style="font-size:11px;color:#7A8299;margin-top:2px">${new Date(iso).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>
          </div>
        </div>`).join("")}
  </div>`:`
  <div class="card">
    <div class="sec-title">📋 전체 완독 기록</div>
    ${allRecords.length===0?`<div class="empty">아직 기록이 없어요</div>`:
      allRecords.slice(0,100).map(r=>`
        <div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <div style="width:34px;height:34px;border-radius:50%;background:#060A12;border:1.5px solid ${r.isMe?"#C9A84C":"rgba(255,255,255,0.1)"};display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0">
            ${r.avatar?`<img src="${r.avatar}" style="width:100%;height:100%;object-fit:cover">`:"🙏"}
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:${r.isMe?700:400}">${esc(r.name)}${r.isMe?`<span style="font-size:10px;color:#C9A84C;margin-left:4px">나</span>`:""}</div>
            <div style="font-size:11px;color:#7A8299">${esc(r.cell)}</div>
          </div>
          <div style="font-size:12px;color:#7A8299;text-align:right;flex-shrink:0">
            <div>${new Date(r.iso).toLocaleDateString("ko-KR",{month:"long",day:"numeric"})}</div>
            <div style="margin-top:2px">${new Date(r.iso).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>
          </div>
        </div>`).join("")}
    ${allRecords.length>100?`<div style="text-align:center;font-size:12px;color:#7A8299;padding:12px 0">최근 100건 표시</div>`:""}
  </div>`}`;}

function buildAdmin(members,r){return`
  <div class="card" style="background:linear-gradient(135deg,#141028,#1A1535)">
    <div class="sec-title">🔗 초대 코드</div>
    <div style="font-family:'Noto Serif KR',serif;font-size:36px;font-weight:900;color:#C9A84C;letter-spacing:10px;text-align:center;padding:10px 0">${r.inviteCode}</div>
    <p style="font-size:12px;color:#7A8299;text-align:center;margin-bottom:14px">이 코드를 카카오톡으로 공유하세요</p>
    <button class="btn-gold" style="padding:11px" id="btn-copy-code">코드 복사하기 📋</button>
  </div>
  <div class="card">
    <div class="sec-title">⚙️ 챌린지 정보</div>
    ${[["교회",r.church],["챌린지",r.challenge],["목표",`${r.goal}독`],["참여자",`${members.length}명`]].map(([k,v])=>`
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px">
        <span style="color:#7A8299">${k}</span><span>${esc(String(v))}</span>
      </div>`).join("")}
  </div>
  <div class="card">
    <div class="sec-title">👥 멤버 관리</div>
    ${members.map(u=>`
      <div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:50%;background:#060A12;border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0">
            ${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">`:"🙏"}
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${esc(u.name)}${u.isAdmin?`<span style="font-size:10px;color:#C9A84C;margin-left:5px">(관리자)</span>`:""}</div>
            <div style="font-size:11px;color:#7A8299">${esc(u.cell)} · ${u.reads?.length||0}독</div>
          </div>
          <button class="btn-sm" data-edit="${u.id}">수정</button>
          ${!u.isAdmin?`<button class="btn-sm danger" data-del="${u.id}">삭제</button>`:""}
        </div>
        <div id="edit-${u.id}" style="display:${S.editTarget===u.id?"flex":"none"};gap:8px;margin-top:10px;padding-left:42px">
          <input type="number" class="inp" id="editval-${u.id}" value="${u.reads?.length||0}" min="0" style="flex:1;padding:9px 12px;font-size:14px"/>
          <button class="btn-save" data-save="${u.id}">저장</button>
        </div>
      </div>`).join("")}
  </div>
  <div class="card">
    <button class="btn-ghost danger-ghost" id="btn-logout">로그아웃</button>
  </div>`;}

function on(id,fn){const el=document.getElementById(id);if(el)el.addEventListener("click",fn);}

function attachEvents(){
  on("btn-back",()=>setState({screen:"landing"}));
  on("btn-back-profile",()=>setState({screen:"home",activeNav:"home",fAvatar:null}));
  on("btn-create",()=>setState({screen:"createRoom"}));
  on("btn-join",()=>setState({screen:"joinRoom"}));
  on("btn-create-room",createRoom);
  on("btn-join-room",joinRoom);
  on("btn-login",login);
  on("btn-save-profile",saveProfile);
  on("btn-save-edit",saveProfileEdit);
  on("btn-record",recordRead);
  on("btn-go-edit",()=>{const me=S.room?.members?.[S.myId];setState({screen:"editProfile",fCell:me?.cell||"",fAvatar:null});});
  on("btn-refresh",async()=>{const d=await dbLoad();if(S.room&&d.rooms[S.roomId])setState({room:d.rooms[S.roomId]});showToast("🔄 새로고침 완료!");});
  on("btn-copy-code",()=>{navigator.clipboard?.writeText(S.room?.inviteCode||"").catch(()=>{});showToast("코드가 복사됐어요!");});
  on("btn-logout",()=>{if(confirm("로그아웃 하시겠어요?")){clearLocal();if(S.unsub)S.unsub();setState({screen:"landing",room:null,roomId:null,myId:null});}});
  on("tab-my",()=>setState({historyTab:"my"}));
  on("tab-all",()=>setState({historyTab:"all"}));

  on("avatar-circle",()=>document.getElementById("avatar-input")?.click());
  const ai=document.getElementById("avatar-input");
  if(ai)ai.addEventListener("change",handleAvatar);

  on("picker-toggle",()=>{const dd=document.getElementById("picker-dropdown");if(dd)dd.style.display=dd.style.display==="none"?"block":"none";});
  document.querySelectorAll(".picker-opt").forEach(el=>{
    el.addEventListener("click",()=>{setState({fCell:el.dataset.val});const dd=document.getElementById("picker-dropdown");if(dd)dd.style.display="none";});
  });
  document.querySelectorAll(".nav-btn").forEach(el=>{el.addEventListener("click",()=>setState({screen:el.dataset.nav,activeNav:el.dataset.nav}));});
  document.querySelectorAll("[data-edit]").forEach(el=>el.addEventListener("click",()=>setState({editTarget:S.editTarget===el.dataset.edit?null:el.dataset.edit})));
  document.querySelectorAll("[data-save]").forEach(el=>el.addEventListener("click",()=>adminSetReads(el.dataset.save)));
  document.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",()=>adminRemoveMember(el.dataset.del)));

  [["f-church","fChurch"],["f-challenge","fChallenge"],["f-goal","fGoal"],["f-name","fName"],["f-pin","fPin"],["f-code","fCode","upper"]].forEach(([id,key,mode])=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener("input",()=>{S[key]=mode==="upper"?el.value.toUpperCase():el.value;});
  });
}

async function createRoom(){
  if(!S.fChurch.trim()){showToast("교회 이름을 입력해 주세요");return;}
  if(!S.fChallenge.trim()){showToast("챌린지 이름을 입력해 주세요");return;}
  setState({loading:true});
  const id=genId(),adminId=genId();
  const newRoom={id,inviteCode:genCode(),church:S.fChurch.trim(),challenge:S.fChallenge.trim(),goal:parseInt(S.fGoal)||500,createdAt:new Date().toISOString(),
    members:{[adminId]:{id:adminId,name:"관리자",cell:"교역자",avatar:null,reads:[],isAdmin:true,createdAt:new Date().toISOString()}}};
  const data=await dbLoad();data.rooms[id]=newRoom;await dbSave(data);
  saveLocal(id,adminId);
  subscribeToRoom(id);
  setState({loading:false,roomId:id,myId:adminId,room:newRoom,screen:"home",activeNav:"home"});
  showToast("🎉 챌린지 방이 만들어졌어요!");
}

async function joinRoom(){
  const code=S.fCode.trim().toUpperCase();
  if(!code){showToast("초대 코드를 입력해 주세요");return;}
  setState({loading:true});
  const data=await dbLoad();
  const found=Object.values(data.rooms||{}).find(r=>r.inviteCode===code);
  if(!found){showToast("❌ 코드를 다시 확인해 주세요");setState({loading:false});return;}
  setState({loading:false,roomId:found.id,room:found,screen:"login"});
}

async function login(){
  if(!S.fName.trim()){showToast("이름을 입력해 주세요");return;}
  if(!/^\d{4}$/.test(S.fPin)){showToast("숫자 4자리를 입력해 주세요");return;}
  setState({loading:true});
  const uid=makeUserId(S.fName,S.fPin);
  const data=await dbLoad();
  const room=data.rooms[S.roomId];
  if(!room){showToast("방을 찾을 수 없어요");setState({loading:false});return;}
  if(room.members?.[uid]){
    saveLocal(S.roomId,uid);
    subscribeToRoom(S.roomId);
    setState({loading:false,myId:uid,room,screen:"home",activeNav:"home"});
    showToast(`반갑습니다, ${room.members[uid].name} 성도님! 🙏`);
  } else {
    setState({loading:false,screen:"register"});
  }
}

async function saveProfile(){
  if(!S.fCell){showToast("소속을 선택해 주세요");return;}
  setState({loading:true});
  const uid=makeUserId(S.fName,S.fPin);
  const member={id:uid,name:S.fName.trim(),cell:S.fCell,avatar:S.fAvatar||null,reads:[],isAdmin:false,createdAt:new Date().toISOString()};
  try{await set(ref(db,`rooms/${S.roomId}/members/${uid}`),member);}catch{
    const data=await dbLoad();if(data.rooms[S.roomId]){data.rooms[S.roomId].members=data.rooms[S.roomId].members||{};data.rooms[S.roomId].members[uid]=member;}await dbSave(data);
  }
  saveLocal(S.roomId,uid);
  subscribeToRoom(S.roomId);
  setState({loading:false,myId:uid,screen:"home",activeNav:"home"});
  showToast("프로필이 저장됐습니다 🙏");
}

async function saveProfileEdit(){
  const nameEl=document.getElementById("f-name-edit");
  const newName=nameEl?nameEl.value.trim():S.fName.trim();
  if(!newName){showToast("이름을 입력해 주세요");return;}
  if(!S.fCell){showToast("소속을 선택해 주세요");return;}
  setState({loading:true});
  const me=S.room.members[S.myId];
  const updated={...me,name:newName,cell:S.fCell};
  if(S.fAvatar)updated.avatar=S.fAvatar;
  try{await set(ref(db,`rooms/${S.roomId}/members/${S.myId}`),updated);}catch{
    const data=await dbLoad();if(data.rooms[S.roomId]?.members[S.myId])data.rooms[S.roomId].members[S.myId]=updated;await dbSave(data);
    setState({room:{...S.room,members:{...S.room.members,[S.myId]:updated}}});
  }
  setState({loading:false,screen:"home",activeNav:"home",fAvatar:null});
  showToast("프로필이 수정됐습니다 ✅");
}

async function recordRead(){
  if(!S.myId||!S.roomId)return;
  setState({loading:true});
  const newReads=[...(S.room?.members?.[S.myId]?.reads||[]),new Date().toISOString()];
  try{await set(ref(db,`rooms/${S.roomId}/members/${S.myId}/reads`),newReads);}catch{
    const data=await dbLoad();if(data.rooms[S.roomId]?.members[S.myId])data.rooms[S.roomId].members[S.myId].reads=newReads;await dbSave(data);
    setState({room:{...S.room,members:{...S.room.members,[S.myId]:{...S.room.members[S.myId],reads:newReads}}}});
  }
  setState({loading:false});
  const count=newReads.length;
  if(MILESTONES.includes(count))showCelebrate(count);
  else showToast(`📖 ${count}독 완료! 수고하셨습니다`);
}

async function adminSetReads(memberId){
  const n=parseInt(document.getElementById(`editval-${memberId}`)?.value);
  if(isNaN(n)||n<0)return;
  const member=S.room?.members?.[memberId];if(!member)return;
  let reads=[...(member.reads||[])];
  if(n>reads.length)for(let i=0;i<n-reads.length;i++)reads.push(new Date().toISOString());
  else reads=reads.slice(0,n);
  try{await set(ref(db,`rooms/${S.roomId}/members/${memberId}/reads`),reads);}catch{
    const data=await dbLoad();if(data.rooms[S.roomId]?.members[memberId])data.rooms[S.roomId].members[memberId].reads=reads;await dbSave(data);
    setState({room:{...S.room,members:{...S.room.members,[memberId]:{...S.room.members[memberId],reads}}},editTarget:null});
  }
  showToast(`✅ ${member.name}님 ${n}독으로 수정됨`);
  setState({editTarget:null});
}

async function adminRemoveMember(memberId){
  if(!confirm("정말 이 멤버를 삭제할까요?"))return;
  try{await set(ref(db,`rooms/${S.roomId}/members/${memberId}`),null);}catch{
    const data=await dbLoad();if(data.rooms[S.roomId]?.members)delete data.rooms[S.roomId].members[memberId];await dbSave(data);
    const m={...S.room.members};delete m[memberId];setState({room:{...S.room,members:m}});
  }
  showToast("삭제되었습니다");
}

function subscribeToRoom(rid){
  if(S.unsub)S.unsub();
  try{S.unsub=onValue(ref(db,`rooms/${rid}`),snap=>{if(snap.exists()){S.room=snap.val();render();}});}catch{}
}

function handleAvatar(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas"),MAX=200,ratio=Math.min(MAX/img.width,MAX/img.height);
      canvas.width=img.width*ratio;canvas.height=img.height*ratio;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      setState({fAvatar:canvas.toDataURL("image/jpeg",0.7)});
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showToast(msg){
  const ex=document.getElementById("toast");if(ex)ex.remove();
  const el=document.createElement("div");el.id="toast";el.className="toast";el.textContent=msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{el.classList.remove("show");setTimeout(()=>el.remove(),300);},2800);
}

function showCelebrate(n){
  const m=CEL[n]||{e:"🎉",t:`${n}독!`,s:"수고하셨습니다"};
  const ex=document.getElementById("celebrate");if(ex)ex.remove();
  const el=document.createElement("div");el.id="celebrate";el.className="celebrate-overlay";
  el.innerHTML=`<div class="celebrate-box">
    <div style="font-size:56px;margin-bottom:12px">${m.e}</div>
    <div style="font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:#C9A84C;margin-bottom:6px">${m.t}</div>
    <div style="font-size:14px;color:#7A8299;margin-bottom:22px">${m.s}</div>
    <button class="btn-ghost" id="btn-close-cel">아멘 🙏</button>
  </div>`;
  document.body.appendChild(el);
  document.getElementById("btn-close-cel")?.addEventListener("click",()=>el.remove());
}

async function init(){
  const urlCode=new URLSearchParams(location.search).get("join");
  const data=await dbLoad();
  if(urlCode){
    const found=Object.values(data.rooms||{}).find(r=>r.inviteCode===urlCode);
    if(found){
      S.roomId=found.id;S.room=found;
      const local=loadLocal();
      if(local?.myId&&found.members?.[local.myId]){
        S.myId=local.myId;saveLocal(found.id,local.myId);
        subscribeToRoom(found.id);setState({screen:"home",activeNav:"home"});
      } else {
        setState({screen:"login"});
      }
      return;
    }
  }
  const local=loadLocal();
  if(local?.roomId&&local?.myId&&data.rooms?.[local.roomId]?.members?.[local.myId]){
    S.roomId=local.roomId;S.myId=local.myId;S.room=data.rooms[local.roomId];
    subscribeToRoom(local.roomId);
    setState({screen:"home",activeNav:"home"});
  } else {
    setState({screen:"landing"});
  }
}
setTimeout(init,1000);
</script>

<style>

.cross{display:inline-block}.glow{animation:glow 3s ease-in-out infinite}
.page{padding:24px 16px 30px;animation:fadeUp .4s ease}

.page-sub{font-size:14px;color:#7A8299;text-align:center;line-height:2}
.footer-txt{position:absolute;bottom:30px;font-size:11px;color:rgba(255,255,255,0.12);letter-spacing:1px}
.back-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.back-btn{background:none;border:none;color:#7A8299;font-size:24px;cursor:pointer;line-height:1}
.hdr-title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:900;color:#C9A84C}
.card{background:#111827;border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:18px;margin-bottom:12px}
.field{margin-bottom:14px}
.lbl{display:block;font-size:11px;color:#7A8299;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.inp{width:100%;background:#060A12;border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:12px 14px;color:#EDE8DF;font-family:'Noto Sans KR',sans-serif;font-size:15px;outline:none}
.inp:focus{border-color:#C9A84C}
.code-inp{text-align:center;font-size:26px;letter-spacing:8px;font-weight:700}
.pin-inp{text-align:center;font-size:24px;letter-spacing:6px}
.btn-gold{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#8B6914,#C9A84C,#F0D47A);color:#060A12;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:4px}
.btn-gold:disabled{opacity:.6}
.btn-ghost{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.1);border-radius:10px;background:rgba(255,255,255,0.04);color:#7A8299;font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer}
.gold-ghost{border-color:rgba(201,168,76,0.25);color:#C9A84C}
.danger-ghost{border-color:rgba(224,92,92,.2);color:#E05C5C}
.btn-green{width:100%;padding:15px;border:none;border-radius:13px;background:linear-gradient(135deg,#1E5C3A,#4CAF8A);color:white;font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(76,175,138,0.25);margin-bottom:14px}
.btn-green:disabled{opacity:.6}
.btn-sm{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:7px;padding:5px 10px;color:#C9A84C;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-sm.danger{background:rgba(224,92,92,.1);border-color:rgba(224,92,92,.2);color:#E05C5C}
.btn-save{background:#4CAF8A;border:none;border-radius:8px;padding:9px 16px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.avatar-circle{width:86px;height:86px;border-radius:50%;background:#060A12;border:2px dashed rgba(201,168,76,0.35);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;overflow:hidden}
.picker-wrap{position:relative}
.picker-display{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:#060A12;border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:12px 14px;font-size:15px}
.picker-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#0E1520;border:1px solid rgba(201,168,76,0.15);border-radius:12px;max-height:240px;overflow-y:auto;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.picker-opt{padding:13px 16px;font-size:15px;cursor:pointer;color:#EDE8DF;border-bottom:1px solid rgba(255,255,255,.04)}
.picker-opt.active,.picker-opt:hover{background:rgba(201,168,76,.1);color:#C9A84C}
.main-wrap{display:flex;flex-direction:column;min-height:100vh}
.main-header{text-align:center;padding:26px 16px 14px;border-bottom:1px solid rgba(201,168,76,0.15)}
.main-content{flex:1;padding:15px;overflow-y:auto;padding-bottom:80px;animation:fadeUp .35s ease}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,12,20,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,0.18);display:flex;z-index:100}
.nav-btn{flex:1;padding:11px 4px;background:none;border:none;color:#7A8299;font-family:'Noto Sans KR',sans-serif;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn.active{color:#C9A84C}
.banner{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#111827,#1A2235);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:14px;margin-bottom:14px;cursor:pointer}
.banner-avatar{width:52px;height:52px;border-radius:50%;background:#060A12;border:2px solid #C9A84C;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
.today-badge{background:rgba(76,175,138,.15);border:1px solid rgba(76,175,138,.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#4CAF8A;flex-shrink:0}
.sec-title{font-family:'Noto Serif KR',serif;font-size:11px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin-bottom:11px}
.empty{text-align:center;color:#7A8299;font-size:13px;padding:14px 0;line-height:1.8}
.read-num{width:26px;height:26px;border-radius:50%;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);display:flex;align-items:center;justify-content:center;font-size:10px;color:#C9A84C;font-weight:700;flex-shrink:0}
.stat-box{background:#111827;border:1px solid rgba(201,168,76,.1);border-radius:12px;padding:13px;text-align:center}
.stat-num{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:#C9A84C;line-height:1}
.stat-label{font-size:11px;color:#7A8299;margin-top:4px}
.tab-bar{display:flex;gap:8px;margin-bottom:12px}
.tab-btn{flex:1;padding:10px;border:1px solid rgba(201,168,76,.2);border-radius:10px;background:rgba(201,168,76,.05);color:#7A8299;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:rgba(201,168,76,.15);color:#C9A84C;border-color:rgba(201,168,76,.4);font-weight:700}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E2E24;border:1px solid rgba(76,175,138,.4);color:white;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:500;z-index:200;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.celebrate-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center}
.celebrate-box{background:#111827;border:2px solid #C9A84C;border-radius:24px;padding:30px 38px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-width:280px}
</style>
</head>
